version: '1.0'
name: fetch1
displayName: fetch
triggers:
  trigger: auto
  pr:
    branches:
      precise:
        - main
  schedule:
    - cron: '* 0 */3 * * ? *'
variables:
  global:
    - GITHUB_TOKEN
stages:
  - name: fetchurl
    displayName: fetchurl
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: fetchurl
        displayName: fetchurl
        nodeVersion: 21.5.0
        commands:
          - git clone https://develop202:${GITHUB_TOKEN}@github.com/develop202/migu_video.git
          - cd migu_video
          - npm config set registry https://registry.npmmirror.com
          - npm install && node fetchURLByAndroid720p.js
          - git config user.name "GitHub Actions"
          - git config user.email "actions@github.com"
          - git add .
          - git diff --quiet && git diff --staged --quiet || git commit -m "Update by GitHub Actions"
          - git push origin main
        strategy:
          retry: '3'
          timeout: 2
